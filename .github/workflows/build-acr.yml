---
name: "Build and Push to Alibaba Cloud ACR"

# 触发条件：
#   - push tag（生产发版用）
#   - 手动触发（测试 / 紧急修复用）
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本标签（例如 v1.0.1），留空则用 git sha'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  # 阿里云 ACR 新加坡实例
  ACR_REGISTRY: registry.cn-singapore.aliyuncs.com
  # 你的 ACR 命名空间（与 docker-compose.yml 中的 your-namespace 对应）
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  # 镜像名
  IMAGE_NAME: xpoz-custom

jobs:
  build-and-push:
    name: Build amd64 → ACR
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest 有 ~14 GB RAM，足够编译

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 确定最终的镜像 tag
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version_tag }}" ]]; then
            VERSION="${{ github.event.inputs.version_tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          echo "📦 Will push: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and Push to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ steps.tag.outputs.latest_image }}
          build-args: |
            NEXT_PUBLIC_VERSION=${{ steps.tag.outputs.version }}
          # 使用 GitHub Actions 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Output image info
        run: |
          echo "✅ 镜像已推送至 ACR:"
          echo "   ${{ steps.tag.outputs.full_image }}"
          echo "   ${{ steps.tag.outputs.latest_image }}"
          echo ""
          echo "🚀 在 ECS 上执行以下命令完成部署："
          echo "   cd /data/compose"
          echo "   export XPOZ_VERSION=${{ steps.tag.outputs.version }}"
          echo "   docker compose pull xpoz"
          echo "   docker compose up -d xpoz"
