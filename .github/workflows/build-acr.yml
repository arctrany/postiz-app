---
name: "Build and Push to GitHub Container Registry"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本标签（例如 v1.0.1），留空则用 git sha'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/xpoz-custom

jobs:
  build-and-push:
    name: Build amd64 → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version_tag }}" ]]; then
            VERSION="${{ github.event.inputs.version_tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Will push: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      # 将包设为 public，ECS 无需认证即可拉取
      - name: Make GHCR package public
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.packages.updatePackageForAuthenticatedUser({
                package_type: 'container',
                package_name: 'xpoz-custom',
                visibility: 'public'
              });
              console.log('✅ Package set to public');
            } catch (e) {
              console.log('⚠️ Could not set visibility (may need org settings):', e.message);
            }

      # SSH 进 ECS 拉取新镜像并重启 xpoz 容器
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.236.244.249
          username: root
          password: ${{ secrets.ECS_PASSWORD }}
          script_stop: true
          script: |
            set -e
            echo "=== Deploying xpoz ${{ steps.tag.outputs.version }} ==="
            cd /data/compose

            # 拉取最新镜像
            export XPOZ_VERSION=${{ steps.tag.outputs.version }}
            docker compose pull xpoz

            # 重启 xpoz（不重启其他服务）
            docker compose up -d --no-deps xpoz

            # 等待启动
            sleep 15

            # 验证状态
            docker compose ps xpoz
            echo "✅ Deploy complete"

      - name: Summary
        run: |
          echo "## ✅ Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ECS: \`47.236.244.249\`" >> $GITHUB_STEP_SUMMARY
          echo "- XPoz URL: https://xpoz.yourdomain.com" >> $GITHUB_STEP_SUMMARY
