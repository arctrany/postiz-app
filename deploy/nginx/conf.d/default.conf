upstream xpoz_app {
    server xpoz:5000;
}

upstream huginn_app {
    server huginn:3000;
}

upstream temporal_ui {
    server temporal-ui:8080;
}

# ─── XPoz ───────────────────────────────────
server {
    listen 80;
    server_name xpoz.example.com;  # 部署时由 deploy.sh 替换

    client_max_body_size 100M;

    location / {
        proxy_pass http://xpoz_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}

# ─── Huginn ─────────────────────────────────
server {
    listen 80;
    server_name huginn.example.com;  # 部署时由 deploy.sh 替换

    client_max_body_size 50M;

    location / {
        proxy_pass http://huginn_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Temporal UI ────────────────────────────
server {
    listen 80;
    server_name temporal.example.com;  # 部署时由 deploy.sh 替换

    location / {
        proxy_pass http://temporal_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
